<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de compra - BioMed Clothes</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
    <br>
    <h1 style="text-align:center">Resumen de Compra</h1>
</header>

<main class="checkout-container">
    <div id="checkout-items" class="checkout-items"></div>

    <div class="checkout-summary">
        <h2>Total: S/<span id="checkout-total">0</span></h2>

        <div class="checkout-actions">
            <a href="../index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Continuar comprando
            </a>

            <button class="confirm-btn" onclick="confirmPurchase()">
                Confirmar compra
            </button>
        </div>
    </div>
</main>

<div id="payment-modal" class="modal">
    <div class="modal-content payment-box">
        <span class="close" onclick="closePaymentModal()">&times;</span>
        <h2>Método de Pago</h2>
        <p>Selecciona cómo deseas pagar:</p>
        
        <div class="payment-methods">
            <button class="method-btn" onclick="showFields('card')">
                <i class="fa-solid fa-credit-card"></i> Tarjeta
            </button>
            <button class="method-btn" onclick="showFields('cash')">
                <i class="fa-solid fa-money-bill-transfer"></i> Transferencia
            </button>
        </div>

        <div id="card-fields" style="display: none; margin-top: 20px;">
            <input type="text" id="card-number" placeholder="Número de tarjeta (16 dígitos)" class="pay-input">
            <div style="display: flex; gap: 10px;">
                <input type="text" placeholder="MM/AA" class="pay-input" style="width: 50%;">
                <input type="text" placeholder="CVV" class="pay-input" style="width: 50%;">
            </div>
            <input type="text" placeholder="Nombre en la tarjeta" class="pay-input">
        </div>

        <button class="confirm-btn" id="final-pay-btn" style="width: 100%; margin-top: 20px; display: none;" onclick="processFinalPayment()">
            Finalizar Pedido
        </button>
    </div>
</div>

<script src="../index.js"></script>

<script>
    const container = document.getElementById("checkout-items");
    const totalText = document.getElementById("checkout-total");
    
    const paymentModal = document.getElementById("payment-modal");
    const cardFields = document.getElementById("card-fields");
    const cashFields = document.getElementById("cash-fields");
    const payBtn = document.getElementById("final-pay-btn");

    function renderCheckout() {
        let cartData = JSON.parse(localStorage.getItem("cart")) || [];
        
        if (cartData.length === 0) {
            container.innerHTML = "<div style='text-align:center; padding:50px;'><h2>Tu carrito está vacío</h2><br><a href='../index.html' class='confirm-btn'>Ir a la tienda</a></div>";
            totalText.innerText = "0";
            return;
        }

        let total = 0;
        container.innerHTML = ""; 

        cartData.forEach((item, index) => {
            let subtotal = item.price * item.quantity;
            total += subtotal;

            const cleanImg = item.image.replace("../", "");

            container.innerHTML += `
            <div class="checkout-card">
                <img src="../${cleanImg}" class="checkout-img" onerror="this.src='../Imagenes/placeholder.jpg'">
                <div class="checkout-info">
                    <h3>${item.name}</h3>
                    <p>Precio: S/${item.price}</p>
                    <p>Cantidad: ${item.quantity}</p>
                    <p class="item-total">Subtotal: S/${subtotal}</p>
                    <button class="remove-checkout-btn" onclick="removeItemCheckout(${index})">
                        <i class="fa-solid fa-trash"></i> Quitar
                    </button>
                </div>
            </div>`;
        });
        totalText.innerText = total;
    }

      function removeItemCheckout(index) {
        let cartData = JSON.parse(localStorage.getItem("cart")) || [];
        cartData.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cartData));
        renderCheckout(); 

        if(typeof updateCart === 'function') updateCart();
    }

    function confirmPurchase() {
        paymentModal.style.display = "flex";
    }

    function closePaymentModal() {
        paymentModal.style.display = "none";
    }

    function showFields(method) {
        payBtn.style.display = "block";
        if (method === 'card') {
            cardFields.style.display = "block";
            cashFields.style.display = "none";
        } else {
            cardFields.style.display = "none";
            cashFields.style.display = "block";
        }
    }

    function processFinalPayment() {
        const cardNumberInput = document.getElementById("card-number");
        
        if (cardFields.style.display === "block") {
            if (cardNumberInput.value.trim().length < 16) {
                alert("Por favor, ingresa un número de tarjeta válido (16 dígitos).");
                return;
            }
        }

        alert("¡Pedido realizado con éxito! 🎉 Gracias por confiar en BioMed Clothes.");
        localStorage.removeItem("cart"); 
        window.location.href = "../index.html"; 
    }

    window.onclick = function(event) {
        if (event.target == paymentModal) {
            closePaymentModal();
        }
    }

    renderCheckout();
</script>

</body>
</html>
